name: Build firmware

on:
  push:
    branches: [main]
    paths:
      - firmware/**
      - .github/workflows/build.yml
  pull_request:
    paths:
      - firmware/**
      - .github/workflows/build.yml

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware

    steps:
      - uses: actions/checkout@v7

      - uses: actions/cache@v6
        with:
          path: |
            ~/.platformio
            firmware/.pio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini', 'firmware/sdkconfig.defaults', 'firmware/partitions.csv', 'firmware/src/**') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        run: pio run
