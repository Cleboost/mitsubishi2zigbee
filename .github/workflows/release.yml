name: Release OTA

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must look like v1.2.3, got ${TAG}" >&2
            exit 1
          fi
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST##*.}"
          FILE_VERSION=$(printf "0x%08X" $(( (MAJOR << 16) | (MINOR << 8) | PATCH )))
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "file_version=${FILE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "ota_name=MZ-Zigbee-C6_${VERSION}.ota" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            firmware/.pio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini', 'firmware/sdkconfig.defaults', 'firmware/partitions.csv', 'firmware/src/**') }}
          restore-keys: pio-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Apply firmware version from tag
        run: chmod +x firmware/scripts/set_firmware_version.sh && firmware/scripts/set_firmware_version.sh "${{ steps.version.outputs.version }}"

      - name: Build firmware
        working-directory: firmware
        run: pio run

      - name: Build OTA image
        run: |
          chmod +x firmware/scripts/build_ota_image.sh
          mkdir -p release
          firmware/scripts/build_ota_image.sh \
            "${{ steps.version.outputs.file_version }}" \
            "release/${{ steps.version.outputs.ota_name }}"

      - name: Copy firmware.bin
        run: cp firmware/.pio/build/esp32-c6-zero/firmware.bin "release/firmware-${{ steps.version.outputs.version }}.bin"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            release/${{ steps.version.outputs.ota_name }}
            release/firmware-${{ steps.version.outputs.version }}.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update OTA index on main
        env:
          VERSION: ${{ steps.version.outputs.version }}
          OTA_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ steps.version.outputs.ota_name }}
        run: |
          git fetch origin main
          git checkout main
          git pull --rebase origin main
          python3 firmware/scripts/update_ota_index.py "$VERSION" "$OTA_URL"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add zigbee2mqtt_converter/ota_index.json
          if git diff --staged --quiet; then
            echo "OTA index unchanged, skip commit"
            exit 0
          fi
          git commit -m "chore(ota): add v${VERSION} to OTA index"
          git push origin main
